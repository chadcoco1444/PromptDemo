services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/lumespec-dev;
      mc anonymous set download local/lumespec-dev;
      exit 0;
      "

  # Feature 4 Auth + History. Runs auto-migrations on first boot by mounting
  # db/migrations/*.sql into docker-entrypoint-initdb.d (Postgres runs any .sql
  # in there on an EMPTY data volume, once). To re-apply migrations on a dirty
  # volume: `docker compose -f docker-compose.dev.yaml down -v` then up again.
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lumespec
      POSTGRES_PASSWORD: lumespec
      POSTGRES_DB: lumespec
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lumespec -d lumespec']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
  minio-data:
  postgres-data:
